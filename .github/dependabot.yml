version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - '@angular*'
      nx:
        patterns:
          - '@nx/*'
          - 'nx'
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
